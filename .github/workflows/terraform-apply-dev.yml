# Auto-apply dev on merge to main.
# WIF binds the apply SA's principalSet to refs/heads/main, so this workflow
# can only authenticate against the apply SA when running on main — a leaked
# workflow on a feature branch cannot apply, period.

name: Terraform — apply dev

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply-dev.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Serialize applies against the same environment.
concurrency:
  group: tf-apply-dev
  cancel-in-progress: false

env:
  TF_VERSION: "1.12.2"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  ENV: dev

jobs:
  apply:
    name: apply dev
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.TF_WIF_PROVIDER_DEV }}
          service_account: ${{ vars.TF_APPLY_SA_DEV }}

      - name: terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_PROJECT_ID_DEV }}-tfstate" \
            -backend-config="prefix=praxedo-infra"

      - name: terraform workspace select
        working-directory: terraform
        run: |
          terraform workspace select ${{ env.ENV }} \
            || terraform workspace new ${{ env.ENV }}

      - name: terraform apply
        working-directory: terraform
        run: |
          terraform apply \
            -auto-approve \
            -lock-timeout=300s \
            -var-file=envs/${{ env.ENV }}.tfvars
