# Daily drift check on main. terraform plan per env using the read-only
# plan SA; -detailed-exitcode fails the job if anything drifted. The red
# run shows up on the Actions tab and on the repo's status — 3 devs
# review weekly. No issue-creation dance: GitHub's own UI is the signal.

name: Terraform — drift detection

on:
  schedule:
    # 04:30 UTC daily — after the 02:00 UTC Cloud SQL backup window.
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tf-drift
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  drift:
    name: drift (${{ matrix.env }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Terraform + auth (plan SA, ${{ matrix.env }})
        uses: ./.github/actions/tf-setup
        with:
          env: ${{ matrix.env }}
          sa-type: plan

      - name: terraform plan (drift)
        working-directory: terraform
        env:
          ENV: ${{ matrix.env }}
        shell: bash
        run: |
          set +e
          terraform plan \
            -no-color \
            -lock-timeout=120s \
            -var-file=envs/${ENV}.tfvars \
            -detailed-exitcode \
            | tee drift-${ENV}.txt
          rc=${PIPESTATUS[0]}
          set -e
          # Publish the diff to the Job Summary so opening the run shows
          # what drifted without scrolling logs.
          {
            echo "## Drift — \`${ENV}\` (exit ${rc})"
            echo '```hcl'
            tail -c 900000 drift-${ENV}.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          case $rc in
            0) echo "::notice::No drift in ${ENV}"; exit 0 ;;
            2) echo "::error::Drift detected in ${ENV}"; exit 1 ;;
            *) echo "::error::Plan failed for ${ENV} (exit $rc)"; exit $rc ;;
          esac
