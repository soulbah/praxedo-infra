# PR checks for the infra repo: fmt + validate + plan per env (sticky
# comment) + security scans.
#
# WIF impersonates the read-only `infra-plan` SA. Fork PRs are excluded —
# untrusted code never receives an OIDC token.

name: Terraform — PR checks

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".terraform-version"
      - ".github/workflows/terraform-*.yml"
      - ".github/actions/tf-setup/**"
  workflow_dispatch:

# Workflow-level: minimal. Per-job permissions widen only what is needed.
permissions:
  contents: read

concurrency:
  group: tf-checks-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  # ------------------------------------------------------------------------
  # fmt + validate + lint + security scan. Offline, no GCP credentials.
  # ------------------------------------------------------------------------
  static:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip drafts (CI minutes) and fork PRs (no OIDC for untrusted code).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version_file: .terraform-version
          terraform_wrapper: false

      - name: terraform fmt
        working-directory: terraform
        run: terraform fmt -recursive -check -diff

      - name: terraform init (offline)
        working-directory: terraform
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint init
        working-directory: terraform
        run: tflint --init

      - name: tflint
        working-directory: terraform
        run: tflint --recursive --format compact

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: terraform
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

  # ------------------------------------------------------------------------
  # Plan per env. Read-only WIF SA. Plan posted as a sticky PR comment.
  # ------------------------------------------------------------------------
  plan:
    name: plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    needs: static
    timeout-minutes: 15
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)

    # Per-job permissions: id-token for WIF, pull-requests for the sticky
    # plan comment. Everything else stays read-only.
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform + auth (plan SA, ${{ matrix.env }})
        uses: ./.github/actions/tf-setup
        with:
          env: ${{ matrix.env }}
          sa-type: plan

      - name: terraform plan
        id: plan
        working-directory: terraform
        env:
          ENV: ${{ matrix.env }}
        shell: bash
        # detailed-exitcode: 0=no-changes, 1=error, 2=changes. We want apply
        # paths to skip on 0, fail on 1, proceed on 2 — recorded as an
        # output for downstream gating (used by terraform-deploy.yml).
        run: |
          set +e
          terraform plan \
            -no-color \
            -lock-timeout=120s \
            -var-file=envs/${ENV}.tfvars \
            -out=tfplan \
            -detailed-exitcode \
            > plan-${ENV}.txt 2>&1
          rc=$?
          set -e
          echo "exitcode=${rc}" >> "$GITHUB_OUTPUT"
          # Surface the tail of the plan even on success so the log stays
          # readable in the Actions UI.
          tail -n 200 plan-${ENV}.txt
          case $rc in
            0) echo "::notice::No changes for ${ENV}" ;;
            2) echo "::notice::Plan for ${ENV} has changes" ;;
            *) echo "::error::Plan for ${ENV} failed (exit $rc)"; exit $rc ;;
          esac

      - name: Job summary — plan diff
        if: always()
        working-directory: terraform
        env:
          ENV: ${{ matrix.env }}
        shell: bash
        run: |
          {
            echo "## Terraform plan — \`${ENV}\`"
            echo
            echo '```hcl'
            tail -c 900000 plan-${ENV}.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}-${{ github.event.pull_request.head.sha || github.sha }}
          path: terraform/tfplan
          retention-days: 1

      - name: Find prior PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v3
        id: prior
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- tf-plan:${{ matrix.env }} -->"

      - name: Upsert PR plan comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        env:
          ENV: ${{ matrix.env }}
        with:
          comment-id: ${{ steps.prior.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- tf-plan:${{ matrix.env }} -->
            ### Terraform plan — `${{ matrix.env }}`

            Commit: `${{ github.event.pull_request.head.sha }}`
            Exit code: `${{ steps.plan.outputs.exitcode }}` (0 = no changes, 2 = changes)

            See the **Job Summary** of this run for the full plan diff
            (truncated comments hide important deletes; the Summary tab
            does not truncate the way comments do).

            Plan artifact (1-day retention):
            `tfplan-${{ matrix.env }}-${{ github.event.pull_request.head.sha }}`
