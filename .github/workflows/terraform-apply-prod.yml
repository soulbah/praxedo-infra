# Prod apply — manual dispatch only, gated behind the `prod` GitHub
# Environment so required reviewers must approve before the job starts.
#
# Two layers of protection:
#   1. workflow_dispatch + environment:prod → GitHub-level approval gate.
#   2. WIF binding pinned to refs/heads/main → OIDC token only mints on
#      main, so even an authorised dispatch on the wrong branch fails auth.

name: Terraform — apply prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "apply-prod" to confirm.'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: tf-apply-prod
  cancel-in-progress: false

env:
  TF_VERSION: "1.12.2"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  ENV: prod

jobs:
  apply:
    name: apply prod
    runs-on: ubuntu-latest
    environment: prod # required reviewers configured on the GitHub side

    steps:
      - name: Validate confirmation input
        if: ${{ inputs.confirm != 'apply-prod' }}
        run: |
          echo "::error::confirm input must be exactly 'apply-prod'"
          exit 1

      - uses: actions/checkout@v4
        with:
          ref: main # WIF only allows main; pinning is belt-and-braces.

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.TF_WIF_PROVIDER_PROD }}
          service_account: ${{ vars.TF_APPLY_SA_PROD }}

      - name: terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_PROJECT_ID_PROD }}-tfstate" \
            -backend-config="prefix=praxedo-infra"

      - name: terraform workspace select
        working-directory: terraform
        run: |
          terraform workspace select ${{ env.ENV }} \
            || terraform workspace new ${{ env.ENV }}

      - name: terraform plan (recorded for the run log)
        working-directory: terraform
        run: |
          terraform plan \
            -no-color \
            -lock-timeout=120s \
            -var-file=envs/${{ env.ENV }}.tfvars \
            -out=tfplan

      - name: terraform apply
        working-directory: terraform
        run: |
          terraform apply \
            -auto-approve \
            -lock-timeout=600s \
            tfplan
