# Enforce Conventional Commits on PR titles. We squash-merge, so the PR
# title becomes the commit message landing on main — keeping it conventional
# keeps the changelog generator and `git log --oneline` review surface
# clean.
#
# Allowed types match the project convention (commits already follow it).

name: PR title — Conventional Commits

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: lint PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            refactor
            docs
            ci
            build
            perf
            test
            style
          requireScope: false
          subjectPattern: '^[A-Za-z0-9].+$'
